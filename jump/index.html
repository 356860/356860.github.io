<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>立定跳远课堂分析 - 阶段状态机优化版</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --line: #d8e2f0;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #246bff;
            --success: #1f9d55;
            --danger: #e85d5d;
        }

        * { box-sizing: border-box; touch-action: manipulation; }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            color: var(--text);
        }

        body { overflow: hidden; }

        .app {
            display: grid;
            grid-template-columns: 1.7fr 1fr;
            width: 100vw;
            height: 100vh;
            gap: 12px;
            padding: 12px;
        }

        .stage {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.08), transparent 34%),
                linear-gradient(180deg, #0c172b 0%, #162745 100%);
            border: 1px solid rgba(216, 226, 240, 0.5);
            min-height: 0;
        }

        #video-layer,
        #draw-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #video-layer {
            transform: scaleX(-1);
            opacity: 0.9;
            filter: contrast(1.04) saturate(0.96) brightness(0.92);
        }

        .top-bar,
        .bottom-bar {
            position: absolute;
            z-index: 10;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .top-bar {
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            justify-content: center;
        }
        .bottom-bar { left: 12px; right: 12px; bottom: 12px; justify-content: center; flex-wrap: wrap; }

        .chip,
        .toolbar,
        .panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(216, 226, 240, 0.95);
            border-radius: 14px;
            box-shadow: 0 10px 26px rgba(36, 107, 255, 0.08);
        }

        .chip {
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
        }

        .title-chip {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 999px;
            color: #ffffff;
            font-size: 20px;
            font-weight: 800;
            backdrop-filter: blur(8px);
            box-shadow: none;
            letter-spacing: 1px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px;
        }

        .student-dock {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 16;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .student-toggle {
            border: 1px solid rgba(216, 226, 240, 0.95);
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: none;
        }

        .student-panel {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            width: min(320px, calc(100vw - 24px));
            padding: 10px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            background: rgba(15, 23, 42, 0.94);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
        }

        .student-panel.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .student-list {
            max-height: 208px;
            overflow-y: auto;
            display: grid;
            gap: 6px;
            margin-bottom: 10px;
            padding-right: 2px;
        }

        .student-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            padding: 10px 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: rgba(255, 255, 255, 0.04);
            color: #cbd5e1;
            cursor: pointer;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease;
        }

        .student-row:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .student-row.is-active {
            background: rgba(36, 107, 255, 0.18);
            border-color: rgba(36, 107, 255, 0.48);
            color: #bfdbfe;
        }

        .student-row-name {
            min-width: 0;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .student-row-delete {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            flex: 0 0 22px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(226, 232, 240, 0.72);
            font-size: 12px;
            font-weight: 500;
            line-height: 1;
            padding: 0;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
            touch-action: manipulation;
        }

        .student-row-delete:hover {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.18);
            color: rgba(252, 165, 165, 0.96);
            transform: scale(1.04);
        }

        .student-row-delete:active,
        .student-row-delete:focus-visible {
            background: rgba(248, 113, 113, 0.14);
            border-color: rgba(248, 113, 113, 0.26);
            color: rgba(254, 202, 202, 1);
            outline: none;
        }

        .student-editor {
            display: grid;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .student-editor input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            outline: none;
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
        }

        .student-editor input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(36, 107, 255, 0.12);
        }

        .student-editor-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .student-editor-actions button {
            min-height: 40px;
            border-radius: 10px;
        }

        .student-editor-hint {
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .sound-dock {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 13;
            display: inline-flex;
            align-items: flex-end;
            flex-direction: column;
            gap: 10px;
        }

        .sound-toggle {
            border: 1px solid rgba(216, 226, 240, 0.95);
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: none;
        }

        .sound-panel {
            width: 250px;
            padding: 12px;
            display: grid;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
            background: rgba(255, 255, 255, 0.94);
        }

        .sound-panel.is-open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .sound-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }

        .sound-row label {
            color: var(--text);
            font-weight: 600;
        }

        .sound-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }

        .sound-volume {
            display: grid;
            gap: 6px;
        }

        .sound-volume input[type="range"] {
            width: 100%;
        }

        .toolbar select,
        .toolbar button,
        .panel button {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .toolbar select { min-width: 120px; }
        .toolbar button.primary { background: var(--primary); color: #fff; border-color: transparent; }
        .toolbar button.danger { background: var(--danger); color: #fff; border-color: transparent; }

        .sidebar {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 0;
            overflow-y: auto;
            padding-right: 4px;
        }

        .panel { padding: 16px; }
        .panel h2, .panel h3 { margin: 0 0 10px; }
        .panel h2 { font-size: 18px; }
        .panel h3 { font-size: 16px; }

        .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }
        .sync-status {
            margin: 8px 0 0;
            padding: 10px 12px;
            border-radius: 12px;
            background: rgba(36, 107, 255, 0.08);
            color: #3156a9;
        }
        .sync-status.is-success {
            background: rgba(31, 157, 85, 0.1);
            color: #147145;
        }
        .sync-status.is-warning {
            background: rgba(245, 158, 11, 0.12);
            color: #9a6500;
        }
        .sync-status.is-error {
            background: rgba(232, 93, 93, 0.1);
            color: #b53939;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .metric {
            background: #f8fbff;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 12px;
        }

        .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
        .metric-value { font-size: 28px; font-weight: 800; }

        .phase-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
        }

        .feedback-box {
            background: #f8fbff;
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 14px;
            margin-top: 12px;
        }

        .mode-panel {
            display: grid;
            gap: 10px;
        }

        .meta-panel {
            display: grid;
            gap: 10px;
        }

        .meta-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .meta-field {
            display: grid;
            gap: 6px;
        }

        .meta-field label {
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
        }

        .meta-field input {
            width: 100%;
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        .meta-field input:focus {
            border-color: rgba(36, 107, 255, 0.45);
            box-shadow: 0 0 0 4px rgba(36, 107, 255, 0.12);
        }

        .meta-hint {
            margin: 0;
        }

        .mode-panel select {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            cursor: pointer;
        }

        .drill-list {
            display: grid;
            gap: 8px;
        }

        .drill-item {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 10px 12px;
            background: #f8fbff;
        }

        .drill-item strong {
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .drill-item span {
            display: block;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .feedback-title { font-size: 19px; font-weight: 800; margin-bottom: 6px; }
        .feedback-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }

        .summary { display: grid; gap: 10px; }

        .summary-card,
        .history-item {
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 12px 14px;
            background: #f8fbff;
        }

        .summary-card strong { display: block; margin-bottom: 6px; font-size: 14px; }
        .summary-card p { margin: 0; font-size: 14px; line-height: 1.6; }

        .history {
            min-height: 0;
            flex: 1 1 auto;
            overflow: auto;
            display: grid;
            gap: 8px;
        }

        .history-item .time { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
        .history-item .result { font-size: 14px; line-height: 1.5; }
        .ok { color: var(--success); }
        .bad { color: var(--danger); }

        .overlay {
            position: absolute;
            inset: 0;
            z-index: 12;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            background: rgba(244, 247, 251, 0.92);
        }

        .overlay-box {
            max-width: 420px;
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 14px 38px rgba(31, 41, 55, 0.12);
        }

        .overlay-title {
            font-size: 30px;
            font-weight: 900;
            color: var(--danger);
            margin-bottom: 10px;
        }

        .overlay-text { color: var(--muted); line-height: 1.7; }

        @media (max-width: 960px) {
            body { overflow: auto; }
            .app { grid-template-columns: 1fr; height: auto; min-height: 100vh; }
            .stage { min-height: 54vh; }
            .meta-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <section class="stage">
            <video id="video-layer" playsinline></video>
            <canvas id="draw-layer"></canvas>

            <div class="top-bar">
                <div class="title-chip">立定跳远课堂版</div>
            </div>

            <div class="student-dock">
                <button id="student-toggle" class="student-toggle" onclick="toggleStudentPanel()">默认学生</button>
                <div id="student-panel" class="toolbar student-panel">
                    <div id="student-list-container" class="student-list"></div>
                    <div class="student-editor">
                        <input id="student-name-input" type="text" maxlength="20" autocomplete="off" placeholder="输入新名字...">
                        <div class="student-editor-actions">
                            <button class="primary" type="button" onclick="submitStudentName()">添加</button>
                        </div>
                        <div id="student-name-hint" class="student-editor-hint">点选名单可切换学生，右侧 × 可删除。</div>
                    </div>
                </div>
            </div>

            <div class="sound-dock">
                <button id="sound-toggle" class="sound-toggle" onclick="toggleSoundPanel()">声音提示</button>
                <div id="sound-panel" class="panel sound-panel">
                    <div class="sound-row">
                        <label for="sound-effects-toggle">音效</label>
                        <input id="sound-effects-toggle" type="checkbox" onchange="updateAudioPrefs()">
                    </div>
                    <div class="sound-row">
                        <label for="voice-guidance-toggle">语音提醒</label>
                        <input id="voice-guidance-toggle" type="checkbox" onchange="updateAudioPrefs()">
                    </div>
                    <div class="sound-row">
                        <label for="voice-praise-toggle">鼓励语音</label>
                        <input id="voice-praise-toggle" type="checkbox" onchange="updateAudioPrefs()">
                    </div>
                    <div class="sound-volume">
                        <label for="audio-volume-range">音量</label>
                        <input id="audio-volume-range" type="range" min="0" max="100" step="5" onchange="updateAudioPrefs()">
                    </div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="toolbar">
                    <button id="start-btn" class="primary" onclick="toggleTraining()">开始分析</button>
                    <button onclick="finishRound()">结束本轮</button>
                    <button onclick="clearCurrentStudentHistory()">清空记录</button>
                </div>
            </div>

            <div class="overlay" id="overlay">
                <div class="overlay-box">
                    <div class="overlay-title">准备中</div>
                    <div class="overlay-text" id="overlay-text">正在打开摄像头并加载姿态识别，请保持网络稳定并允许摄像头权限。</div>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <section class="panel">
                <h3>训练项目</h3>
                <div class="mode-panel">
                    <select id="mode-select" onchange="changeMode()">
                        <option value="full">完整立定跳远</option>
                        <option value="arms">摆臂专项</option>
                        <option value="preload">预摆蹬伸专项</option>
                        <option value="landing">落地缓冲专项</option>
                    </select>
                    <div class="drill-list" id="drill-list"></div>
                </div>
            </section>

            <section class="panel">
                <h3>课堂信息</h3>
                <div class="meta-panel">
                    <div class="meta-grid">
                        <div class="meta-field">
                            <label for="class-name-input">班级</label>
                            <input id="class-name-input" type="text" maxlength="30" placeholder="例如：三年级二班" onchange="updateSessionMeta()" onblur="updateSessionMeta()">
                        </div>
                        <div class="meta-field">
                            <label for="group-name-input">小组</label>
                            <input id="group-name-input" type="text" maxlength="30" placeholder="例如：第一组" onchange="updateSessionMeta()" onblur="updateSessionMeta()">
                        </div>
                        <div class="meta-field">
                            <label for="session-label-input">课次</label>
                            <input id="session-label-input" type="text" maxlength="40" placeholder="例如：2026-03-24 上午课" onchange="updateSessionMeta()" onblur="updateSessionMeta()">
                        </div>
                    </div>
                    <p class="muted meta-hint">这些信息会写入每次训练总结，后面做大屏和分组统计时直接可用。</p>
                </div>
            </section>

            <section class="panel">
                <h2>实时反馈</h2>
                <div class="phase-badge" id="phase-badge">阶段：待机</div>
                <div class="feedback-box">
                    <div class="feedback-title" id="feedback-main">请侧身站立，保证全身入镜</div>
                    <div class="feedback-sub" id="feedback-sub">建议从侧面拍摄，双脚和双手都要完整入镜，先站稳再开始动作。</div>
                </div>
                <div class="status-grid">
                    <div class="metric">
                        <div class="metric-label">练习次数</div>
                        <div class="metric-value ok" id="practice-count">0</div>
                    </div>
                </div>
            </section>

            <section class="panel">
                <h3>本轮结果</h3>
                <div class="summary" id="round-summary">
                    <div class="summary-card">
                        <strong>动作结果</strong>
                        <p>开始分析后，系统会按照“站稳准备 → 预摆 → 蹬伸起跳 → 腾空 → 落地缓冲”五个阶段判断动作，并给出针对性指导。</p>
                    </div>
                </div>
            </section>

            <section class="panel" style="min-height: 0; display: flex; flex-direction: column;">
                <h3>学生历史</h3>
                <p class="muted">每次结束本轮后，会保存当前学生的练习次数、主要问题和下一轮建议。</p>
                <p class="muted sync-status" id="sync-status">云端同步：准备中。</p>
                <div class="history" id="history-list"></div>
            </section>
        </aside>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
